services:
  postgres:
    image: postgres:17.10
    container_name: gonzbnet-e2e-postgres
    environment:
      POSTGRES_DB: gonzbnet_a
      POSTGRES_USER: gonzb
      POSTGRES_PASSWORD: gonzb
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "55432:5432"
    volumes:
      - gonzbnet_e2e_postgres:/var/lib/postgresql/data
      - ./test/e2e/gonzbnet/postgres-init.sql:/docker-entrypoint-initdb.d/001-gonzbnet-e2e.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gonzb -d gonzbnet_a"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  gonzbnet_e2e_postgres:
