name: Build Dev Image

on:
    push:
        branches: [ dev ]
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    test-and-publish-dev-image:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:17.10
                env:
                    POSTGRES_DB: gonzb_ci_test
                    POSTGRES_USER: gonzb_test
                    POSTGRES_PASSWORD: gonzb_test
                    POSTGRES_INITDB_ARGS: --data-checksums
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U gonzb_test -d gonzb_ci_test"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 12
        env:
            CI: "true"
            GONZB_REQUIRE_TEST_PG: "1"
            GONZB_TEST_PG_DSN: postgres://gonzb_test:gonzb_test@127.0.0.1:5432/gonzb_ci_test?sslmode=disable
            GONZB_QUERY_SOAK: "1"
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Lowercase repo name
              run: |
                echo "REPO_LOWER=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                go-version: '1.25'

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                node-version: "22"
                cache: "npm"
                cache-dependency-path: ui/package-lock.json

            - name: Install UI dependencies
              run: npm --prefix ui ci

            - name: Build UI assets
              run: npm --prefix ui run build

            - name: Install test tools
              run: |
                sudo apt-get update
                sudo apt-get install --yes ffmpeg p7zip-full

            - name: Run Go tests
              run: ./scripts/test_ci.sh

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push dev Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: |
                  ghcr.io/${{ env.REPO_LOWER }}:dev
                  ghcr.io/${{ env.REPO_LOWER }}:dev-${{ github.sha }}
                build-args: |
                  VERSION=dev-${{ github.sha }}
