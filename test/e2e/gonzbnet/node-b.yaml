# TEST FIXTURE ONLY. Loopback endpoints, disposable credentials, and .e2e state.
port: "18082"
bind_address: "127.0.0.1"
servers:
  - id: "e2e-fixture"
    host: "127.0.0.1"
    port: 11119
    tls: false
    max_connections: 2
    priority: 1
    # GoNZBNet validation uses its own unscoped NNTP client scope; "scrape" is
    # the closest valid provider role and keeps this disposable provider enabled.
    roles: ["scrape"]
modules:
  downloader: { enabled: false }
  aggregator: { enabled: true }
  usenet_indexer: { enabled: false }
  gonzbnet: { enabled: true }
  web_ui: { enabled: true }
  api: { enabled: true }
api:
  cors_allowed_origins: ["http://127.0.0.1:18082"]
aggregator:
  sources:
    gonzbnet: { enabled: true }
gonzbnet:
  mode: integrated
  node_alias: "e2e-validator-b"
  advertise_url: "http://127.0.0.1:18082/gonzbnet/v1"
  keys_dir: ".e2e/gonzbnet/node-b/keys"
  http_enabled: true
  allow_insecure_peer_http: true
  private_network: true
  network_id: "gonzbnet-e2e"
  local_pool_id: "pool.e2e"
  manual_peers:
    - "http://127.0.0.1:18081"
    - "http://127.0.0.1:18083"
  consumer_enabled: true
  scanner_enabled: false
  index_projection_enabled: true
  manifest_builder_enabled: false
  manifest_cache_enabled: true
  validator_enabled: true
  health_checker_enabled: true
  coverage_enabled: false
  scheduler_enabled: false
  health_attestations_enabled: true
  health_attestations_interval_minutes: 1
  validation_interval_minutes: 1
  pull_sync_enabled: true
  pull_sync_interval_minutes: 1
  push_sync_enabled: true
  push_sync_interval_minutes: 1
  websocket_gossip_enabled: false
  relay_enabled: false
  live_query_enabled: false
  send_user_context: false
log: { path: ".e2e/gonzbnet/node-b/gonzb.log", level: "debug", include_stdout: true }
store:
  sqlite_path: ".e2e/gonzbnet/node-b/gonzb.db"
  blob_dir: ".e2e/gonzbnet/node-b/blobs"
  payload_cache_enabled: true
  search_persistence_enabled: true
  pg_dsn: "postgres://gonzb:gonzb@127.0.0.1:55432/gonzbnet_b?sslmode=disable"
